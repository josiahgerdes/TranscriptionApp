<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Transcriber</title>
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient glow blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(91,80,232,0.25) 0%, transparent 70%);
      top: -150px; left: -150px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(236,72,153,0.18) 0%, transparent 70%);
      bottom: -100px; right: -100px;
    }

    /* Everything above blobs */
    h1, .subtitle, .drop-zone, .loading, .error-msg, .results, .corner-logo {
      position: relative;
      z-index: 1;
    }

    .corner-logo {
      position: fixed;
      top: 24px;
      left: 28px;
      height: 56px;
      width: auto;
      z-index: 10;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 40px;
    }

    /* ── Drop Zone ── */
    .drop-zone {
      width: 100%;
      max-width: 580px;
      height: 340px;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 18px;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      position: relative;
      user-select: none;
      overflow: hidden;
    }

    /* inner glow on hover */
    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: radial-gradient(ellipse at 50% 60%, rgba(139,92,246,0.15) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .drop-zone:hover::before,
    .drop-zone.drag-over::before { opacity: 1; }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: rgba(139,92,246,0.5);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 40px rgba(139,92,246,0.15), 0 0 80px rgba(139,92,246,0.08);
    }

    .plus-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 30px rgba(124,58,237,0.5), 0 0 60px rgba(219,39,119,0.25);
    }

    .drop-zone:hover .plus-circle {
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(124,58,237,0.7), 0 0 80px rgba(219,39,119,0.4);
    }

    .plus-circle svg {
      width: 42px; height: 42px;
      stroke: white;
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    .drop-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
    }

    .drop-types {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
    }

    #file-input { display: none; }

    /* ── Loading ── */
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      width: 100%;
      max-width: 580px;
      height: 340px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1.5px solid rgba(255,255,255,0.08);
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .spinner {
      width: 56px; height: 56px;
      border: 3px solid rgba(139,92,246,0.2);
      border-top-color: #a78bfa;
      border-right-color: #f472b6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p {
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
    }

    .loading .file-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.2);
    }

    /* ── Error ── */
    .error-msg {
      display: none;
      width: 100%;
      max-width: 580px;
      margin-top: 14px;
      padding: 12px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      color: #fca5a5;
      font-size: 0.875rem;
      position: relative;
      z-index: 1;
    }

    /* ── Results ── */
    .results {
      display: none;
      width: 100%;
      max-width: 580px;
      margin-top: 0;
      position: relative;
      z-index: 1;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .results-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
    }

    .results-file {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.25);
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .transcript-box {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 24px 26px;
      min-height: 220px;
      max-height: 440px;
      overflow-y: auto;
      font-size: 0.95rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.8);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .transcript-box::-webkit-scrollbar { width: 5px; }
    .transcript-box::-webkit-scrollbar-track { background: transparent; }
    .transcript-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 22px;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: white;
      box-shadow: 0 0 20px rgba(124,58,237,0.4), 0 0 40px rgba(219,39,119,0.2);
    }

    .btn-primary:hover {
      box-shadow: 0 0 28px rgba(124,58,237,0.6), 0 0 56px rgba(219,39,119,0.3);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(255,255,255,0.12);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.11);
      color: white;
    }

    .btn-ghost {
      background: transparent;
      color: rgba(255,255,255,0.3);
      border: 1.5px solid rgba(255,255,255,0.08);
    }

    .btn-ghost:hover {
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

  <img class="corner-logo" src="https://cdn.prod.website-files.com/606e1c2f16ced731f6fb83d0/62101a33d96f8d61074bbc22_Ifegate%20Stacked.svg" alt="Logo" />

  <h1>Video Transcriber</h1>
  <p class="subtitle">Upload a video — get a transcript you can read or download.</p>

  <!-- Drop Zone -->
  <div class="drop-zone" id="drop-zone">
    <div class="plus-circle">
      <svg viewBox="0 0 24 24" fill="none">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
    </div>
    <p class="drop-label">Click to choose a file, or drag &amp; drop here</p>
    <p class="drop-types">MP4 · MOV · AVI · WEBM · M4A · MP3</p>
    <input type="file" id="file-input" accept="video/*,audio/*" />
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loading-status">Transcribing<span id="loading-dots"></span></p>
    <p class="file-label" id="loading-file"></p>
  </div>

  <!-- Error -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <h2>Transcript</h2>
      <span class="results-file" id="results-file"></span>
    </div>
    <div class="transcript-box" id="transcript-box"></div>
    <div class="actions">
      <button class="btn btn-primary" onclick="downloadDocx()">⬇ Download Word Doc</button>
      <button class="btn btn-secondary" onclick="downloadTxt()">⬇ Download TXT</button>
      <button class="btn btn-ghost" onclick="resetApp()">Transcribe Another</button>
    </div>
  </div>

<script>
  const dropZone      = document.getElementById('drop-zone');
  const fileInput     = document.getElementById('file-input');
  const loadingEl     = document.getElementById('loading');
  const loadingFile   = document.getElementById('loading-file');
  const loadingStatus = document.getElementById('loading-status');
  const resultsEl     = document.getElementById('results');
  const transcriptBox = document.getElementById('transcript-box');
  const errorMsg      = document.getElementById('error-msg');

  let currentTranscript = '';
  let currentFileName   = '';

  // Animated dots
  let dotsTimer;
  function startDots() {
    const el = document.getElementById('loading-dots');
    let n = 0;
    dotsTimer = setInterval(() => { el.textContent = '.'.repeat((n++ % 3) + 1); }, 400);
  }
  function stopDots() {
    clearInterval(dotsTimer);
    document.getElementById('loading-dots').textContent = '';
  }
  function setStatusText(text) {
    loadingStatus.childNodes[0].textContent = text;
  }

  // Click to open file picker
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  // Drag & drop
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  ['dragleave', 'dragend'].forEach(ev =>
    dropZone.addEventListener(ev, () => dropZone.classList.remove('drag-over'))
  );
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  // ── WAV encoder ───────────────────────────────────────────
  function encodeWAV(samples, sampleRate) {
    const buf = new ArrayBuffer(44 + samples.length * 2);
    const v   = new DataView(buf);
    const str = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };

    str(0,  'RIFF'); v.setUint32(4,  36 + samples.length * 2, true);
    str(8,  'WAVE'); str(12, 'fmt ');
    v.setUint32(16, 16, true);
    v.setUint16(20, 1,  true);
    v.setUint16(22, 1,  true);
    v.setUint32(24, sampleRate, true);
    v.setUint32(28, sampleRate * 2, true);
    v.setUint16(32, 2,  true);
    v.setUint16(34, 16, true);
    str(36, 'data'); v.setUint32(40, samples.length * 2, true);

    let off = 44;
    for (let i = 0; i < samples.length; i++) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
    return new Blob([buf], { type: 'audio/wav' });
  }

  // ── Audio decode via OfflineAudioContext ───────────────────
  async function decodePCM(file) {
    setStatusText('Decoding audio');
    const arrayBuffer = await file.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let decoded;
    try {
      decoded = await audioCtx.decodeAudioData(arrayBuffer);
    } catch {
      await audioCtx.close();
      throw new Error('Could not decode audio. Make sure the file is a valid video or audio file.');
    }
    await audioCtx.close();

    const SR     = 16000;
    const frames = Math.ceil(decoded.duration * SR);
    setStatusText('Processing audio');
    const offCtx = new OfflineAudioContext(1, frames, SR);
    const src    = offCtx.createBufferSource();
    src.buffer   = decoded;
    src.connect(offCtx.destination);
    src.start(0);
    const rendered = await offCtx.startRendering();
    return rendered.getChannelData(0);
  }

  // ── Main handler ──────────────────────────────────────────
  async function handleFile(file) {
    currentFileName = file.name;
    hideError();
    showLoading(file.name);

    try {
      const SR         = 16000;
      const CHUNK_SIZE = 110 * SR;
      const pcm        = await decodePCM(file);
      const numChunks  = Math.ceil(pcm.length / CHUNK_SIZE);
      const parts      = [];

      for (let i = 0; i < numChunks; i++) {
        setStatusText(numChunks > 1 ? `Transcribing part ${i + 1} of ${numChunks}` : 'Transcribing');
        const slice   = pcm.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
        const wavBlob = encodeWAV(slice, SR);
        const wavFile = new File([wavBlob], 'audio.wav', { type: 'audio/wav' });
        parts.push(await transcribeWithWhisper(wavFile));
      }

      currentTranscript = parts.join(' ');
      showResults(currentTranscript, file.name);
    } catch (err) {
      hideLoading();
      showError(err.message || 'Transcription failed. Try again.');
    }
  }

  async function transcribeWithWhisper(file) {
    const form = new FormData();
    form.append('file', file, file.name);
    form.append('model', 'whisper-1');

    const res = await fetch('/api/transcribe', {
      method: 'POST',
      body: form,
    });

    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error || `Server returned ${res.status}`);
    }

    const data = await res.json();
    return data.text;
  }

  // ── Download helpers ───────────────────────────────────────
  function downloadDocx() {
    try {
      const { zipSync, strToU8 } = fflate;
      const baseName = currentFileName.replace(/\.[^/.]+$/, '');
      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

      const bodyXml = currentTranscript.split('\n').map(line =>
        `<w:p><w:pPr><w:spacing w:after="160"/></w:pPr><w:r><w:rPr><w:sz w:val="24"/></w:rPr><w:t xml:space="preserve">${esc(line)}</w:t></w:r></w:p>`
      ).join('');

      const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:body>
    <w:p><w:pPr><w:pStyle w:val="Heading1"/></w:pPr><w:r><w:t>${esc(baseName)} — Transcript</w:t></w:r></w:p>
    <w:p/>
    ${bodyXml}
    <w:sectPr><w:pgSz w:w="12240" w:h="15840"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440"/></w:sectPr>
  </w:body>
</w:document>`;

      const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;

      const rels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

      const zipped = zipSync({
        '[Content_Types].xml':          strToU8(contentTypes),
        '_rels/.rels':                  strToU8(rels),
        'word/document.xml':            strToU8(docXml),
        'word/_rels/document.xml.rels': strToU8(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"/>`),
      });

      const blob = new Blob([zipped], {
        type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
      });
      triggerDownload(blob, baseName + '_transcript.docx');
    } catch (err) {
      alert('Could not generate Word doc: ' + err.message);
    }
  }

  function downloadTxt() {
    const blob = new Blob([currentTranscript], { type: 'text/plain;charset=utf-8' });
    const baseName = currentFileName.replace(/\.[^/.]+$/, '');
    triggerDownload(blob, baseName + '_transcript.txt');
  }

  function triggerDownload(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  // ── UI state helpers ───────────────────────────────────────
  function showLoading(fileName) {
    dropZone.style.display = 'none';
    resultsEl.style.display = 'none';
    loadingFile.textContent = fileName;
    setStatusText('Starting');
    loadingEl.style.display = 'flex';
    startDots();
  }

  function hideLoading() {
    stopDots();
    loadingEl.style.display = 'none';
    dropZone.style.display = 'flex';
  }

  function showResults(text, fileName) {
    stopDots();
    loadingEl.style.display = 'none';
    dropZone.style.display = 'none';
    transcriptBox.textContent = text;
    document.getElementById('results-file').textContent = fileName;
    resultsEl.style.display = 'block';
  }

  function resetApp() {
    resultsEl.style.display = 'none';
    dropZone.style.display = 'flex';
    fileInput.value = '';
    currentTranscript = '';
    currentFileName = '';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  function hideError() {
    errorMsg.style.display = 'none';
  }
</script>
</body>
</html>
