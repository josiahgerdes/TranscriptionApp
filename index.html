<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Transcriber</title>
  <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.12/dist/ffmpeg.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    /* ── API Key ── */
    .api-section {
      width: 100%;
      max-width: 580px;
      margin-bottom: 20px;
    }

    .api-section label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .api-row {
      display: flex;
      gap: 8px;
    }

    .api-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 0.9rem;
      outline: none;
      background: white;
      color: #111;
      transition: border-color 0.15s;
    }

    .api-row input:focus { border-color: #5b50e8; }

    /* ── Drop Zone ── */
    .drop-zone {
      width: 100%;
      max-width: 580px;
      height: 320px;
      border: 2.5px dashed #ccc;
      border-radius: 20px;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 16px;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      user-select: none;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #5b50e8;
      background: #f8f7ff;
    }

    .plus-circle {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #5b50e8;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
      box-shadow: 0 4px 20px rgba(91, 80, 232, 0.35);
    }

    .drop-zone:hover .plus-circle {
      transform: scale(1.07);
      background: #4a40d4;
    }

    .plus-circle svg {
      width: 40px;
      height: 40px;
      stroke: white;
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    .drop-label {
      font-size: 1rem;
      color: #555;
    }

    .drop-types {
      font-size: 0.78rem;
      color: #aaa;
    }

    #file-input { display: none; }

    /* ── Loading ── */
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 580px;
      height: 320px;
      background: white;
      border-radius: 20px;
      border: 1.5px solid #e8e8e8;
      justify-content: center;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid #ede9ff;
      border-top-color: #5b50e8;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p {
      color: #888;
      font-size: 0.95rem;
    }

    .loading .file-label {
      font-size: 0.8rem;
      color: #bbb;
    }

    /* ── Error ── */
    .error-msg {
      display: none;
      width: 100%;
      max-width: 580px;
      margin-top: 12px;
      padding: 12px 16px;
      background: #fff5f5;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      color: #c53030;
      font-size: 0.875rem;
    }

    /* ── Results ── */
    .results {
      display: none;
      width: 100%;
      max-width: 580px;
      margin-top: 0;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .results-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #111;
    }

    .results-file {
      font-size: 0.78rem;
      color: #aaa;
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .transcript-box {
      background: white;
      border: 1.5px solid #e8e8e8;
      border-radius: 16px;
      padding: 22px 24px;
      min-height: 220px;
      max-height: 420px;
      overflow-y: auto;
      font-size: 0.95rem;
      line-height: 1.75;
      color: #222;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .transcript-box::-webkit-scrollbar { width: 6px; }
    .transcript-box::-webkit-scrollbar-track { background: transparent; }
    .transcript-box::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #5b50e8;
      color: white;
      box-shadow: 0 2px 10px rgba(91, 80, 232, 0.3);
    }

    .btn-primary:hover { background: #4a40d4; }

    .btn-secondary {
      background: white;
      color: #444;
      border: 1.5px solid #ddd;
    }

    .btn-secondary:hover { background: #f7f7f7; }

    .btn-ghost {
      background: transparent;
      color: #999;
      border: 1.5px solid #e8e8e8;
    }

    .btn-ghost:hover { color: #555; background: #f7f7f7; }
  </style>
</head>
<body>

  <h1>Video Transcriber</h1>
  <p class="subtitle">Upload a video — get a transcript you can read or download.</p>

  <div class="api-section">
    <label for="api-key">OpenAI API Key</label>
    <div class="api-row">
      <input type="password" id="api-key" placeholder="sk-..." autocomplete="off" />
    </div>
  </div>

  <!-- Drop Zone -->
  <div class="drop-zone" id="drop-zone">
    <div class="plus-circle">
      <svg viewBox="0 0 24 24" fill="none">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
    </div>
    <p class="drop-label">Click to choose a file, or drag &amp; drop here</p>
    <p class="drop-types">MP4 · MOV · AVI · WEBM · M4A · MP3</p>
    <input type="file" id="file-input" accept="video/*,audio/*" />
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loading-status">Transcribing<span id="loading-dots"></span></p>
    <p class="file-label" id="loading-file"></p>
  </div>

  <!-- Error -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <h2>Transcript</h2>
      <span class="results-file" id="results-file"></span>
    </div>
    <div class="transcript-box" id="transcript-box"></div>
    <div class="actions">
      <button class="btn btn-primary" onclick="downloadDocx()">⬇ Download Word Doc</button>
      <button class="btn btn-secondary" onclick="downloadTxt()">⬇ Download TXT</button>
      <button class="btn btn-ghost" onclick="resetApp()">Transcribe Another</button>
    </div>
  </div>

<script>
  const dropZone      = document.getElementById('drop-zone');
  const fileInput     = document.getElementById('file-input');
  const loadingEl     = document.getElementById('loading');
  const loadingFile   = document.getElementById('loading-file');
  const loadingStatus = document.getElementById('loading-status');
  const resultsEl     = document.getElementById('results');
  const transcriptBox = document.getElementById('transcript-box');
  const errorMsg      = document.getElementById('error-msg');
  const apiKeyInput   = document.getElementById('api-key');

  const WHISPER_LIMIT = 25 * 1024 * 1024; // 25 MB

  let currentTranscript = '';
  let currentFileName   = '';
  let ffmpegInstance    = null;

  // Restore saved API key
  apiKeyInput.value = localStorage.getItem('ta_api_key') || '';
  apiKeyInput.addEventListener('input', () => {
    localStorage.setItem('ta_api_key', apiKeyInput.value.trim());
  });

  // Animated dots
  let dotsTimer;
  function startDots() {
    const el = document.getElementById('loading-dots');
    let n = 0;
    dotsTimer = setInterval(() => { el.textContent = '.'.repeat((n++ % 3) + 1); }, 400);
  }
  function stopDots() {
    clearInterval(dotsTimer);
    document.getElementById('loading-dots').textContent = '';
  }
  function setStatusText(text) {
    loadingStatus.childNodes[0].textContent = text;
  }

  // Click to open file picker
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  // Drag & drop
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  ['dragleave', 'dragend'].forEach(ev =>
    dropZone.addEventListener(ev, () => dropZone.classList.remove('drag-over'))
  );
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  // ── FFmpeg: lazy-load and compress audio ──────────────────
  async function getFFmpeg() {
    if (ffmpegInstance) return ffmpegInstance;
    const { createFFmpeg } = window.FFmpeg;
    ffmpegInstance = createFFmpeg({
      log: false,
      corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
    });
    setStatusText('Loading compressor');
    await ffmpegInstance.load();
    return ffmpegInstance;
  }

  async function compressToAudio(file) {
    setStatusText('Compressing audio');
    const ff = await getFFmpeg();
    const { fetchFile } = window.FFmpeg;

    const ext = file.name.split('.').pop().toLowerCase() || 'mp4';
    const inputName = `input.${ext}`;

    ff.FS('writeFile', inputName, await fetchFile(file));
    // extract audio only, mono, 16kHz, 32kbps — tiny file, great for speech
    await ff.run('-i', inputName, '-vn', '-ac', '1', '-ar', '16000', '-b:a', '32k', 'output.mp3');

    const data = ff.FS('readFile', 'output.mp3');
    try { ff.FS('unlink', inputName); } catch {}
    try { ff.FS('unlink', 'output.mp3'); } catch {}

    return new File([data.buffer], 'audio.mp3', { type: 'audio/mpeg' });
  }

  // ── Main handler ──────────────────────────────────────────
  async function handleFile(file) {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { showError('Enter your OpenAI API key above.'); return; }

    currentFileName = file.name;
    hideError();
    showLoading(file.name);

    try {
      let fileToSend = file;

      if (file.size > WHISPER_LIMIT) {
        fileToSend = await compressToAudio(file);
        if (fileToSend.size > WHISPER_LIMIT) {
          throw new Error('Video audio is too long even after compression. Try splitting it into shorter segments.');
        }
      }

      setStatusText('Transcribing');
      const transcript = await transcribeWithWhisper(fileToSend, apiKey);
      currentTranscript = transcript;
      showResults(transcript, file.name);
    } catch (err) {
      hideLoading();
      showError(err.message || 'Transcription failed. Check your API key and try again.');
    }
  }

  async function transcribeWithWhisper(file, apiKey) {
    const form = new FormData();
    form.append('file', file, file.name);
    form.append('model', 'whisper-1');

    const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { Authorization: `Bearer ${apiKey}` },
      body: form,
    });

    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error?.message || `OpenAI returned ${res.status}`);
    }

    const data = await res.json();
    return data.text;
  }

  // ── Download helpers ───────────────────────────────────────
  async function downloadDocx() {
    const { Document, Packer, Paragraph, TextRun, HeadingLevel } = window.docx;

    const baseName = currentFileName.replace(/\.[^/.]+$/, '');
    const lines = currentTranscript.split('\n');
    const paragraphs = [
      new Paragraph({
        text: baseName + ' — Transcript',
        heading: HeadingLevel.HEADING_1,
      }),
      new Paragraph({ text: '' }),
      ...lines.map(line =>
        new Paragraph({
          children: [new TextRun({ text: line, size: 24, font: 'Calibri' })],
          spacing: { after: 120 },
        })
      ),
    ];

    const doc = new Document({
      sections: [{ properties: {}, children: paragraphs }],
    });

    const blob = await Packer.toBlob(doc);
    triggerDownload(blob, baseName + '_transcript.docx');
  }

  function downloadTxt() {
    const blob = new Blob([currentTranscript], { type: 'text/plain;charset=utf-8' });
    const baseName = currentFileName.replace(/\.[^/.]+$/, '');
    triggerDownload(blob, baseName + '_transcript.txt');
  }

  function triggerDownload(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  // ── UI state helpers ───────────────────────────────────────
  function showLoading(fileName) {
    dropZone.style.display = 'none';
    resultsEl.style.display = 'none';
    loadingFile.textContent = fileName;
    setStatusText('Starting');
    loadingEl.style.display = 'flex';
    startDots();
  }

  function hideLoading() {
    stopDots();
    loadingEl.style.display = 'none';
    dropZone.style.display = 'flex';
  }

  function showResults(text, fileName) {
    stopDots();
    loadingEl.style.display = 'none';
    dropZone.style.display = 'none';
    transcriptBox.textContent = text;
    document.getElementById('results-file').textContent = fileName;
    resultsEl.style.display = 'block';
  }

  function resetApp() {
    resultsEl.style.display = 'none';
    dropZone.style.display = 'flex';
    fileInput.value = '';
    currentTranscript = '';
    currentFileName = '';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  function hideError() {
    errorMsg.style.display = 'none';
  }
</script>
</body>
</html>
